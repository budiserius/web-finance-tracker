name: Deploy Finance Tracker to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.SSH_KEY}}
          port: ${{secrets.PORT}}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20
            cd /home/mbudis23/projects/web-finance-tracker
            git pull origin main
            npm install
            npm prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart web-finance-tracker || pm2 start npm --name "web-finance-tracker" -- start -- -p 3002
